          - LeftLeg
          - RightLockNub
          - LeftLockNub
          - BipodCap
          - BipodButton
        hardware:
          - screw_6_32_socket_head: 2
          - screw_6_32_phillips: 1
          - dowel_3_32: 2
          - spring_bipod_lock: 1

      bipod:
        components:
          - RGB_MainBody
          - RGB_Base
          - RGB_Insert
          - RGB_TopSupportBar
          - RGB_BottomSupportBar
