      hardware:
        - screw_6_32_socket_head: 0
        - screw_6_32_phillips: 0
    variants:
      railgun:
        components:
          - RG_MainBody
          - RG_Base
          - RG_TopSupportBar
          - RG_BottomSupportBar
          - RG_BottomRail
        hardware:
          - screw_6_32_phillips: 3
          - screw_6_32_socket_head: 5

      bipod-sub-assembly:
        components:
          - BipodCore
