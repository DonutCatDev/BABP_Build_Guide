site_name: BABP Assembly Instructions
site_description: Comprehensive assembly guide for the BABP blaster.
site_url: ""

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - glightbox
  - exporter:
      formats:
        pdf:
          enabled: true
          concurrency: 1

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables

extra_css:
  - stylesheets/extra.css

